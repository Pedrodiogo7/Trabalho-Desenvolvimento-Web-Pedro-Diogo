<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema de XP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 Sistema de Pontuação</h1>

<p class="descricao">
  Ganhe experiência ao completar missões ou perca pontos ao falhar.
  Controle seu progresso como em um jogo!
</p>

<div class="xp-container">
  <h2>XP Atual</h2>
  <p id="xp">0</p>
</div>

<div class="botoes">
  <button onclick="addXP()">+10 XP</button>
  <button onclick="removeXP()">-5 XP</button>
</div>

<p id="mensagem"></p>

<script src="script.js"></script>

</body>
</html>
